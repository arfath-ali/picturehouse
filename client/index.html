<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./dist/styles.css" />
    <script type="module" src="./dist/main.js"></script>
    <link rel="icon" href="./src/assets/images/favicon.png" />
    <title>Picturehouse</title>
  </head>
  <body data-state="">
    <header
      class="hidden px-8 pt-4 pb-2 home:block movies:block tv-shows:block search:block watchlist:block"
    >
      <div class="flex justify-between items-center">
        <div class="flex items-center gap-16">
          <img
            class="w-[clamp(10rem,8.214rem+8.929vw,16.25rem)] h-auto"
            src="./src/assets/images/brand.png"
            alt="Picturehouse Logo"
          />
          <nav
            class="fixed bottom-0 w-full left-0 flex py-4 px-8 items-center justify-between md:static md:gap-16 md:w-auto"
          >
            <a class="nav-item home:nav-item--active" href="/home">Home</a>
            <a class="nav-item movies:nav-item--active" href="/movies">
              Movies
            </a>
            <a class="nav-item tv-shows:nav-item--active" href="/tv-shows">
              TV Shows
            </a>
            <a class="nav-item search:nav-item--active" href="/search">
              Search
            </a>

            <a class="nav-item watchlist:nav-item--active" href="/watchlist">
              Watchlist
            </a>
          </nav>
        </div>
        <a href="/profile">
          <img
            class="w-[clamp(2rem,1.857rem+0.714vw,2.5rem)] h-auto"
            src="./src/assets/images/profile.png"
            alt="Profile Icon"
          />
        </a>
      </div>
    </header>

    <main class="pb-12">
      <section class="hidden home:block">Home</section>
      <section class="hidden movies:block">Movies</section>
      <section class="hidden tv-shows:block">TV Shows</section>
      <section class="hidden details:block">Details</section>
      <section class="hidden search:block">Search</section>
      <section class="hidden watchlist:block">Watchlist</section>
      <section class="hidden profile:block">Profile</section>
    </main>
  </body>
</html>
