<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./dist/styles.css" />
    <script type="module" src="./dist/main.js"></script>
    <link rel="icon" href="./src/assets/images/favicon.png" />
    <title>Picturehouse</title>
  </head>
  <body data-state="">
    <header
      class="hidden px-8 pt-4 pb-2 home:block search:block watchlist:block"
    >
      <div class="flex justify-between items-center">
        <div class="flex items-center gap-16">
          <img
            class="w-[clamp(10rem,8.214rem+8.929vw,16.25rem)] h-auto"
            src="./src/assets/images/brand.png"
            alt="Picturehouse Logo"
          />
          <nav
            class="fixed bottom-0 w-full left-0 flex py-4 px-8 items-center justify-between md:static md:gap-16 md:w-auto"
          >
            <a href="#">Home</a>
            <a href="#">Search</a>
            <a href="#">Watchlist</a>
          </nav>
        </div>
        <img
          class="w-[clamp(2rem,1.857rem+0.714vw,2.5rem)] h-auto"
          src="./src/assets/images/profile.png"
          alt="Profile Icon"
        />
      </div>
    </header>

    <main class="pb-12">
      <section class="hidden home:block"></section>
      <section class="hidden details:block"></section>
      <section class="hidden search:block"></section>
      <section class="hidden watchlist:block"></section>
      <section class="hidden profile:block"></section>
    </main>
  </body>
</html>
